<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WM 2026">
<meta name="theme-color" content="#06122b">
<title>WM 2026 – Spielplan</title>
<style>
:root {
  --bg:#f0f4f8; --surface:#e2eaf4; --card:#ffffff; --card2:#dce6f0;
  --accent:#0055a4; --accent2:#0077cc; --green:#16a34a; --red:#dc2626;
  --text:#0f1f30; --muted:#5a7a9a; --border:#c8d8e8; --r:11px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;min-height:100vh;padding-bottom:calc(64px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased}
header{background:linear-gradient(180deg,#d6e4f0 0%,var(--surface) 100%);padding:14px 14px 10px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:1.6rem;line-height:1}
.logo-title{font-size:1.15rem;font-weight:800;color:var(--accent);letter-spacing:-.01em}
.logo-sub{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.status-pill{font-size:.62rem;font-weight:800;padding:3px 9px;border-radius:12px;letter-spacing:.06em;white-space:nowrap}
.status-pill.live{background:var(--red);color:#fff;animation:blink 1.4s infinite}
.status-pill.loading{background:var(--accent2);color:#fff}
.status-pill.offline{background:#555;color:#ccc}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.65}}
.filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);color:var(--muted);padding:5px 13px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .12s;user-select:none}
.chip.on{background:var(--accent);color:#ffffff;border-color:var(--accent)}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px 8px 34px;border-radius:8px;font-size:.85rem;outline:none;font-family:inherit}
.search-wrap input:focus{border-color:var(--accent2)}
.search-wrap input::placeholder{color:var(--muted)}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}
.view{display:none}
.view.active{display:block}
.sched{padding:10px 10px 0}
.day-head{display:flex;align-items:center;gap:7px;padding:5px 2px 7px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
.day-head .pip{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.day-head.is-today{color:var(--green)}
.day-head.is-today .pip{background:var(--green)}
.day-head.is-past{opacity:.45}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;transition:border-color .12s,transform .08s;cursor:pointer}
.card:active{transform:scale(0.985)}
.card.is-live{border-color:var(--red)}
.card.is-today{border-color:#0055a4}
.card.is-past{opacity:.62}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.phase-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.card-right{display:flex;align-items:center;gap:6px}
.live-pill{background:var(--red);color:#fff;font-size:.58rem;font-weight:900;letter-spacing:.1em;padding:2px 6px;border-radius:4px;text-transform:uppercase;animation:blink 1.2s infinite}
.time-venue{font-size:.67rem;color:var(--muted);text-align:right;line-height:1.35}
.teams{display:flex;align-items:center;gap:6px}
.team{flex:1;display:flex;align-items:center;gap:7px;min-width:0}
.team.r{flex-direction:row-reverse;text-align:right}
.flag{font-size:1.45rem;line-height:1;flex-shrink:0}
.tname{font-size:.88rem;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-mid{display:flex;align-items:center;gap:5px;flex-shrink:0;min-width:62px;justify-content:center}
.sc{font-size:1.35rem;font-weight:800;color:var(--accent);min-width:18px;text-align:center;line-height:1}
.sc-sep{color:var(--muted);font-size:.9rem}
.vs-txt{font-size:.7rem;color:var(--muted);font-weight:600}
.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty big{font-size:2rem;display:block;margin-bottom:8px}
.groups-wrap{padding:10px}
.g-block{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.g-title{background:var(--accent);color:#ffffff;font-size:.78rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:7px 13px;display:flex;align-items:center;justify-content:space-between}
.g-teams{font-size:.7rem;color:#ffffff77;font-weight:600}
table{width:100%;border-collapse:collapse}
th{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:6px 7px;text-align:center;border-bottom:1px solid var(--border);font-weight:700}
th:first-child{text-align:left;padding-left:13px;min-width:110px}
td{padding:8px 7px;font-size:.82rem;text-align:center;border-bottom:1px solid #1a306044}
td:first-child{text-align:left;padding-left:13px}
tr:last-child td{border-bottom:none}
.t-cell{display:flex;align-items:center;gap:6px}
.pts-cell{font-weight:800;color:var(--accent)}
.adv td{background:#dceeff}
.ko-wrap{padding:10px}
.ko-info{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;text-align:center}
.ko-info .big{font-size:2.5rem;margin-bottom:8px}
.ko-info h3{font-size:1rem;color:var(--accent);margin-bottom:6px}
.ko-info p{font-size:.82rem;color:var(--muted);line-height:1.6}
.round-badge{display:inline-block;background:#e8f0fb;border:1px solid var(--accent)66;color:var(--accent);font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:5px;margin-bottom:8px}
.ko-round-section{margin-bottom:14px}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0;border:none;background:none;color:var(--muted);font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;font-family:inherit;transition:color .12s}
.nb.on{color:var(--accent)}
.nb svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ranking-wrap{padding:10px}
.rank-table{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.rank-header{background:var(--accent);color:#ffffff;font-size:.78rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:8px 13px;display:flex;align-items:center;justify-content:space-between}
.scorers{display:flex;justify-content:space-between;margin-top:7px;padding-top:6px;border-top:1px solid var(--border);gap:6px}
.scorers-h{font-size:.68rem;color:var(--muted);flex:1;line-height:1.5}
.scorers-a{font-size:.68rem;color:var(--muted);flex:1;text-align:right;line-height:1.5}
.rank-pos{width:24px;text-align:center;font-size:.75rem;color:var(--muted);font-weight:700}
.rank-pos.top{color:var(--accent);font-weight:900}
.rank-flag{font-size:1.1rem;margin:0 4px}
.rank-name{flex:1;font-size:.85rem;font-weight:600}
.rank-grp{font-size:.65rem;color:var(--muted);margin-right:6px}
td.rank-pts{font-weight:800;color:var(--accent)}
.favedit-wrap{padding:10px}
.fav-header{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.fav-header h3{font-size:.9rem;color:var(--accent);font-weight:800;margin-bottom:4px}
.fav-header p{font-size:.75rem;color:var(--muted);line-height:1.4}
.fav-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.fav-team-btn{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 10px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all .12s;user-select:none}
.fav-team-btn.selected{border-color:var(--accent);background:var(--card2)}
.fav-team-btn .fav-flag{font-size:1.2rem;line-height:1}
.fav-team-btn .fav-name{font-size:.78rem;font-weight:600;color:var(--text);flex:1}
.fav-team-btn .fav-star{font-size:.9rem;opacity:0;transition:opacity .12s}
.fav-team-btn.selected .fav-star{opacity:1}
.fav-done-btn{width:100%;background:var(--accent);color:#ffffff;border:none;padding:11px;border-radius:9px;font-size:.9rem;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.02em}
.chip.fav-chip.on{background:linear-gradient(90deg,var(--accent),#1ab89a)}
.install{background:var(--card2);border:1px solid var(--accent)55;border-radius:var(--r);padding:12px 14px;margin:10px 10px 0;display:flex;align-items:center;gap:10px}
.install-icon{font-size:1.6rem;line-height:1;flex-shrink:0}
.install p{font-size:.75rem;color:var(--muted);flex:1;line-height:1.4}
.install strong{color:var(--accent);display:block;margin-bottom:1px}
.install-btn{background:var(--accent);color:#ffffff;border:none;padding:7px 16px;border-radius:8px;font-size:.8rem;font-weight:800;cursor:pointer;font-family:inherit;flex-shrink:0;letter-spacing:.02em}
.install-close{background:transparent;color:var(--muted);border:1px solid var(--border);padding:5px 9px;border-radius:7px;font-size:.8rem;cursor:pointer;font-family:inherit;flex-shrink:0;margin-left:2px}
.api-banner{background:#e8f0fb;border:1px solid var(--green)44;border-radius:var(--r);padding:9px 13px;margin:8px 10px 0;display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--muted)}
.api-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.api-dot.orange{background:orange}
.api-dot.grey{background:#555}
.refresh-btn{margin-left:auto;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;font-size:.7rem;cursor:pointer;font-family:inherit;flex-shrink:0}
.refresh-btn:active{opacity:.7}
@media(min-width:520px){body,header,nav{max-width:520px}body{margin:0 auto}header{left:50%;transform:translateX(-50%)}nav{left:50%;transform:translateX(-50%)}}
</style>
</head>

// ═══════════════════════════════════════
const API = "https://worldcup26.ir";
let GAMES = STATIC_GAMES.map(g => ({...g}));
let apiStatus = 'offline';
let lastUpdate = null;

// API team_id → our 3-letter code
const TEAM_ID = {
  '1':'MEX','2':'RSA','3':'KOR','4':'CZE','5':'CAN','6':'BIH','7':'QAT','8':'SUI',
  '9':'BRA','10':'MAR','11':'HAI','12':'SCO','13':'USA','14':'PAR','15':'AUS','16':'TUR',
  '17':'GER','18':'CUR','19':'CIV','20':'ECU','21':'NED','22':'JPN','23':'SWE','24':'TUN',
  '25':'BEL','26':'EGY','27':'IRN','28':'NZL','29':'ESP','30':'CPV','31':'SAU','32':'URU',
  '33':'FRA','34':'SEN','35':'IRQ','36':'NOR','37':'ARG','38':'ALG','39':'AUT','40':'JOR',
  '41':'POR','42':'COD','43':'UZB','44':'COL','45':'ENG','46':'CRO','47':'GHA','48':'PAN',
};

function mapGamesFromAPI(apiGames) {
  // The API creates MULTIPLE entries per fixture (live updates appended as new rows).
  // So we match by TEAM PAIR, preferring: finished > inPlay > has score > newest.
  const byPair = {};

  const rank = e => e.finished ? 3 : e.inPlay ? 2 : (e.sH !== null ? 1 : 0);

  for(const ag of apiGames) {
    const hId = String(ag.home_team_id || '');
    const aId = String(ag.away_team_id || '');
    if(!hId || !aId) continue;
    const key = `${hId}|${aId}`;

    const finished = String(ag.finished||'').toUpperCase() === 'TRUE';
    const inPlay = ag.time_elapsed && ag.time_elapsed !== 'notstarted' && ag.time_elapsed !== 'fulltime' && !finished;
    let sH = null, sA = null;
    const rawH = ag.home_score, rawA = ag.away_score;
    if(rawH != null && String(rawH) !== 'null' && rawH !== '') {
      const nH = Number(rawH), nA = Number(rawA);
      if(!isNaN(nH) && !isNaN(nA) && (finished || inPlay || nH > 0 || nA > 0)) {
        sH = nH; sA = nA;
      }
    }
    const ps = s => (!s || s === 'null' || s === '') ? null : s;
    const entry = {
      sH, sA, finished, inPlay,
      scorersH: ps(ag.home_scorers),
      scorersA: ps(ag.away_scorers),
      timeElapsed: (ag.time_elapsed && ag.time_elapsed !== 'notstarted') ? ag.time_elapsed : null,
    };

    const prev = byPair[key];
    if(!prev || rank(entry) > rank(prev)) {
      byPair[key] = entry;
    } else if(rank(entry) === rank(prev) && entry.sH !== null) {
      // Same rank: prefer the later one (live updates come later in list)
      byPair[key] = entry;
    }
  }

  // Reverse lookup: our code → API team id
  const CODE_TO_ID = {};
  Object.keys(TEAM_ID).forEach(id => { CODE_TO_ID[TEAM_ID[id]] = id; });

  return STATIC_GAMES.map(sg => {
    const hId = CODE_TO_ID[sg.h];
    const aId = CODE_TO_ID[sg.a];
    if(!hId || !aId) return {...sg};
    // Try both orientations (API might have home/away flipped)
    let api = byPair[`${hId}|${aId}`];
    let flipped = false;
    if(!api) {
      api = byPair[`${aId}|${hId}`];
      flipped = true;
    }
    if(!api) return {...sg};
    if(flipped) {
      return {...sg, sH: api.sA, sA: api.sH,
        scorersH: api.scorersA, scorersA: api.scorersH,
        timeElapsed: api.timeElapsed};
    }
    return {...sg, sH: api.sH, sA: api.sA,
      scorersH: api.scorersH, scorersA: api.scorersA,
      timeElapsed: api.timeElapsed};
  });
}

function setPill(type, txt) {
  const p = document.getElementById('statusPill');
  if(!p) return;
  p.className = `status-pill ${type}`;
  p.textContent = txt;
}

function showApiBanner(success) {
  const b = document.getElementById('apiBanner');
  if(!b) return;
  const time = lastUpdate ? lastUpdate.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '';
  if(success) {
    b.innerHTML = `<div class="api-banner"><span class="api-dot"></span>Live-Daten · Stand: ${time}<button class="refresh-btn" onclick="loadLiveData()">↺ Aktualisieren</button></div>`;
  } else {
    b.innerHTML = `<div class="api-banner"><span class="api-dot grey"></span>Spielplan offline · Ergebnisse aktuell nicht verfügbar<button class="refresh-btn" onclick="loadLiveData()">↺ Erneut versuchen</button></div>`;
  }
}

async function fetchWithTimeout(url, opts, ms=5000) {
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), ms);
  try {
    const r = await fetch(url, {...opts, signal:ctrl.signal});
    clearTimeout(tid);
    return r;
  } catch(e) { clearTimeout(tid); throw e; }
}

async function loadLiveData() {
  setPill('loading','Lade…');

  let token = null;
  try { token = localStorage.getItem('wm26_token'); } catch(e){}

  const parseGames = d => Array.isArray(d) ? d : (d.data||d.matches||d.games||[]);

  const sources = [
    // 1) Direct API (with stored token if present)
    async () => {
      const headers = {'Accept':'application/json'};
      if(token) headers['Authorization'] = `Bearer ${token}`;
      const r = await fetchWithTimeout(`${API}/get/games`, {headers}, 5000);
      if(!r.ok) throw new Error(`direct ${r.status}`);
      return parseGames(await r.json());
    },
    // 2) Fresh registration, then direct
    async () => {
      const r = await fetchWithTimeout(`${API}/auth/register`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name:"WM2026App",email:`wm${Date.now()}@app.local`,password:"WM2026!app"})
      }, 5000);
      if(!r.ok) throw new Error(`register ${r.status}`);
      const rd = await r.json();
      const t = rd.token||rd.access_token||(rd.data&&rd.data.token);
      if(!t) throw new Error('no token');
      try { localStorage.setItem('wm26_token', t); } catch(e){}
      const r2 = await fetchWithTimeout(`${API}/get/games`, {
        headers: {'Accept':'application/json','Authorization':`Bearer ${t}`}
      }, 5000);
      if(!r2.ok) throw new Error(`post-register ${r2.status}`);
      return parseGames(await r2.json());
    },
    // 3) CORS proxy fallback: allorigins
    async () => {
      const r = await fetchWithTimeout(
        `https://api.allorigins.win/raw?url=${encodeURIComponent(API+'/get/games')}`, {}, 8000);
      if(!r.ok) throw new Error(`allorigins ${r.status}`);
      return parseGames(await r.json());
    },
    // 4) CORS proxy fallback: corsproxy.io
    async () => {
      const r = await fetchWithTimeout(
        `https://corsproxy.io/?url=${encodeURIComponent(API+'/get/games')}`, {}, 8000);
      if(!r.ok) throw new Error(`corsproxy ${r.status}`);
      return parseGames(await r.json());
    },
  ];

  for(const src of sources) {
    try {
      const games = await src();
      if(games && games.length > 0) {
        GAMES = mapGamesFromAPI(games);
        lastUpdate = new Date();
        const liveCount = GAMES.filter(g=>isLive(g.d,g.t)).length;
        setPill('live', liveCount>0?`● ${liveCount} LIVE`:'● aktuell');
        showApiBanner(true);
        render();
        if(curView===1) renderGroups();
        return;
      }
    } catch(e) { console.warn('source failed:', e.message); }
  }

  setPill('offline','📅 Spielplan');
  showApiBanner(false);
  render();
}

setInterval(()=>{
  if(GAMES.some(g=>isLive(g.d,g.t))) loadLiveData();
}, 60000);

// Timezone helper: MESZ (UTC+2) → Fort St. John BC (PDT = UTC-7 in summer)
// Difference: FSJ is 9 hours BEHIND MESZ
function fsjTime(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  let fsjH = h - 9;
  let dayOffset = 0;
  if(fsjH < 0) { fsjH += 24; dayOffset = -1; }
  const period = fsjH >= 12 ? 'pm' : 'am';
  const h12 = fsjH === 0 ? 12 : fsjH > 12 ? fsjH - 12 : fsjH;
  const suffix = dayOffset < 0 ? ' (Vortag)' : '';
  return `${h12}:${String(m).padStart(2,'0')} ${period}${suffix}`;
}

const NOW=()=>new Date();
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function today0(){const n=NOW();n.setHours(0,0,0,0);return n}
function isToday(ds){return parseD(ds).getTime()===today0().getTime()}
function isPast(ds,ts){
  const d=parseD(ds),t0=today0();
  if(d<t0)return true;
  if(d.getTime()===t0.getTime()){
    const[h,m]=ts.split(':').map(Number);
    const gEnd=new Date(d);gEnd.setHours(h,m+110);
    return NOW()>gEnd;
  }
  return false;
}
function isLive(ds,ts){
  const d=parseD(ds),t0=today0();
  if(d.getTime()!==t0.getTime())return false;
  const[h,m]=ts.split(':').map(Number);
  const ko=new Date(d);ko.setHours(h,m);
  const end=new Date(ko);end.setMinutes(end.getMinutes()+115);
  return NOW()>=ko&&NOW()<=end;
}
function fmtDate(ds){
  const d=parseD(ds);
  const dn=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const mn=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  return`${dn[d.getDay()]}, ${d.getDate()}. ${mn[d.getMonth()]}`;
}
function phLbl(ph,g){
  const m={gruppe:`Gruppe ${g}`,sechzehntelfinale:'Sechzehntelfinale',achtelfinale:'Achtelfinale',viertelfinale:'Viertelfinale',halbfinale:'Halbfinale',finale:'Finale'};
  return m[ph]||ph;
}

// STATE
// ═══════════════════════════════════════
let filter='all',curView=0;
let pendingFilter=null;
// Favorites – persisted in localStorage
let favorites=new Set();
try{const s=localStorage.getItem('wm26_favs');if(s)favorites=new Set(JSON.parse(s));}catch(e){}
function saveFavs(){try{localStorage.setItem('wm26_favs',JSON.stringify([...favorites]));}catch(e){}}
function setFilter(f){
  if(f==='favoriten' && favorites.size===0){
    // No favorites yet → open editor first
    switchView(4);
    pendingFilter='favoriten';
    return;
  }
  filter=f;
  const fs=['all','live','today','favoriten','gruppe','sechzehntelfinale','achtelfinale','viertelfinale','halbfinale','finale'];
  document.querySelectorAll('.chip').forEach((c,i)=>c.classList.toggle('on',fs[i]===f));
  switchView(0);
  render();
}
function switchView(v){
  curView=v;
  ['viewSchedule','viewGroups','viewKO','viewRanking','viewFavEdit'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('active',i===v);
  });
  [0,1,2,3].forEach(i=>{
    const nb=document.getElementById('nb'+i);
    if(nb) nb.classList.toggle('on',i===v);
  });
  if(v===0)render();
  if(v===1)renderGroups();
  if(v===2)renderKO();
  if(v===3)renderRanking();
  if(v===4)renderFavEdit();
}

// ═══════════════════════════════════════
// RENDER SCHEDULE
// ═══════════════════════════════════════
function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const t0=today0();
  let list=GAMES.filter(g=>{
    if(filter==='live')return isLive(g.d,g.t);
    if(filter==='today')return isToday(g.d);
    if(filter==='favoriten')return favorites.has(g.h)||favorites.has(g.a);
    if(filter!=='all')return g.ph===filter;
    return true;
  });
  if(q)list=list.filter(g=>{
    const hn=N(g.h).toLowerCase(),an=N(g.a).toLowerCase(),vn=(g.v||'').toLowerCase();
    return hn.includes(q)||an.includes(q)||vn.includes(q)||g.h.toLowerCase().includes(q)||g.a.toLowerCase().includes(q);
  });
  const byD={};
  list.forEach(g=>{if(!byD[g.d])byD[g.d]=[];byD[g.d].push(g)});
  const cont=document.getElementById('schedCont');
  if(!list.length){cont.innerHTML=`<div class="empty"><big>🔍</big>Keine Spiele gefunden</div>`;return}
  let html='';
  Object.keys(byD).sort().forEach(ds=>{
    const td=parseD(ds),isPastDay=td<t0,isTodayDay=td.getTime()===t0.getTime();
    let dayCls=isPastDay&&!isTodayDay?'is-past':isTodayDay?'is-today':'';
    html+=`<div class="day-head ${dayCls}"><span class="pip"></span>${fmtDate(ds)}${isTodayDay?' · Heute':''}</div>`;
    byD[ds].forEach(g=>{
      const live=isLive(g.d,g.t),past=isPast(g.d,g.t),tod=isToday(g.d);
      const cc=live?'is-live':tod?'is-today':past?'is-past':'';
      const hC=isCode(g.h),aC=isCode(g.a);
      const hasScore=g.sH!==null&&g.sA!==null;
      const liveMin = live && g.timeElapsed && g.timeElapsed !== 'fulltime' && g.timeElapsed !== 'notstarted' ? g.timeElapsed+"'" : null;
      const scorerLine = (g.scorersH || g.scorersA) ? `<div class="scorers"><span class="scorers-h">${g.scorersH ? '⚽ '+g.scorersH : ''}</span><span class="scorers-a">${g.scorersA ? g.scorersA+' ⚽' : ''}</span></div>` : '';
      html+=`<div class="card ${cc}">
        <div class="card-top">
          <span class="phase-lbl">${phLbl(g.ph,g.g)}</span>
          <div class="card-right">${liveMin ? `<span class="live-pill">${liveMin}</span>` : live ? '<span class="live-pill">LIVE</span>' : ''}
            <div class="time-venue">${g.t} MESZ · ${fsjTime(g.t)} FSJ<br><span style="font-size:.58rem;opacity:.7">${g.v||''}</span></div>
          </div>
        </div>
        <div class="teams">
          <div class="team">${hC?`<span class="flag">${F(g.h)}</span>`:''}<span class="tname">${hC?N(g.h):g.h}</span></div>
          <div class="score-mid">${hasScore?`<span class="sc">${g.sH}</span><span class="sc-sep">:</span><span class="sc">${g.sA}</span>`:`<span class="vs-txt">${live?'●':'vs'}</span>`}</div>
          <div class="team r">${aC?`<span class="flag">${F(g.a)}</span>`:''}<span class="tname">${aC?N(g.a):g.a}</span></div>
        </div>
        ${scorerLine}
      </div>`;
    });
  });
  cont.innerHTML=html;
}

// ═══════════════════════════════════════
// RENDER GROUPS
// ═══════════════════════════════════════
function renderGroups(){
  const st={};
  Object.keys(GD).forEach(g=>{st[g]={};GD[g].teams.forEach(t=>{st[g][t]={sp:0,g:0,u:0,v:0,tore:0,gegen:0,diff:0,pts:0}})});
  GAMES.filter(x=>x.ph==='gruppe'&&x.sH!==null).forEach(m=>{
    const s=st[m.g];if(!s||!s[m.h]||!s[m.a])return;
    s[m.h].sp++;s[m.a].sp++;
    s[m.h].tore+=m.sH;s[m.h].gegen+=m.sA;s[m.a].tore+=m.sA;s[m.a].gegen+=m.sH;
    if(m.sH>m.sA){s[m.h].g++;s[m.h].pts+=3;s[m.a].v++}
    else if(m.sH<m.sA){s[m.a].g++;s[m.a].pts+=3;s[m.h].v++}
    else{s[m.h].u++;s[m.a].u++;s[m.h].pts++;s[m.a].pts++}
  });
  Object.keys(st).forEach(g=>Object.values(st[g]).forEach(t=>{t.diff=t.tore-t.gegen}));
  let html='';
  Object.keys(GD).forEach(g=>{
    const teams=[...GD[g].teams].sort((a,b)=>{const sa=st[g][a],sb=st[g][b];return sb.pts-sa.pts||sb.diff-sa.diff||sb.tore-sa.tore});
    html+=`<div class="g-block"><div class="g-title">Gruppe ${g}<span class="g-teams">${GD[g].teams.map(t=>GD[g].n[t]).join(', ')}</span></div>
      <table><tr><th>Team</th><th>Sp</th><th>G</th><th>U</th><th>V</th><th>T</th><th>Diff</th><th>Pkt</th></tr>`;
    teams.forEach((t,i)=>{
      const s=st[g][t];
      html+=`<tr${i<2?' class="adv"':''}><td><div class="t-cell">${F(t)} ${GD[g].n[t]}</div></td>
        <td>${s.sp}</td><td>${s.g}</td><td>${s.u}</td><td>${s.v}</td>
        <td>${s.tore}:${s.gegen}</td><td>${s.diff>=0?'+'+s.diff:s.diff}</td><td class="pts-cell">${s.pts}</td></tr>`;
    });
    html+='</table></div>';
  });
  document.getElementById('groupsCont').innerHTML=html;
}

          </div>

          <div class="score-mid">${hasScore?`<span class="sc">${g.sH}</span><span class="sc-sep">:</span><span class="sc">${g.sA}</span>`:`<span class="vs-txt">vs</span>`}</div>

// RENDER RANKING (all 48 teams sorted)
// ═══════════════════════════════════════
function renderRanking() {
  // Build standings across all groups
  const allTeams = [];
  Object.keys(GD).forEach(g => {
    GD[g].teams.forEach(t => {
      allTeams.push({code:t, group:g, sp:0,gw:0,u:0,v:0,tore:0,gegen:0,diff:0,pts:0});
    });
  });
  const byCode = {};
  allTeams.forEach(t => byCode[t.code] = t);

  GAMES.filter(x=>x.ph==='gruppe'&&x.sH!==null).forEach(m=>{
    const h=byCode[m.h], a=byCode[m.a];
    if(!h||!a) return;
    h.sp++;a.sp++;
    h.tore+=m.sH;h.gegen+=m.sA;a.tore+=m.sA;a.gegen+=m.sH;
    if(m.sH>m.sA){h.gw++;h.pts+=3;a.v++;}
    else if(m.sH<m.sA){a.gw++;a.pts+=3;h.v++;}
    else{h.u++;a.u++;h.pts++;a.pts++;}
  });
  allTeams.forEach(t=>t.diff=t.tore-t.gegen);

  // Sort: pts desc, diff desc, tore desc, name
  allTeams.sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.tore-a.tore||N(a.code).localeCompare(N(b.code)));

  const isFav = t => favorites.has(t);

  let html = `<div class="rank-table">
    <div class="rank-header">
      Gesamtrangliste · Gruppenphase
      <span style="font-size:.65rem;opacity:.7">${allTeams.filter(t=>t.sp>0).length} Teams mit Spielen</span>
    </div>
    <table>
      <tr>
        <th style="width:28px">#</th>
        <th style="text-align:left;padding-left:8px">Team</th>
        <th>Gr.</th><th>Sp</th><th>T</th><th>Diff</th><th>Pkt</th>
      </tr>`;

  allTeams.forEach((t,i) => {
    const fav = isFav(t.code);
    const top = i < 24; // top 24 advance (approx)
    html += `<tr style="${fav?'background:#1f4a6a;':''}" onclick="toggleFav('${t.code}')">
      <td><span class="rank-pos ${top?'top':''}">${i+1}</span></td>
      <td style="text-align:left;padding-left:8px">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:1.1rem">${F(t.code)}</span>
          <span style="font-size:.82rem;font-weight:${fav?'800':'600'};color:${fav?'var(--accent)':'var(--text)'}">${N(t.code)}</span>
          ${fav?'<span style="font-size:.7rem">⭐</span>':''}
        </div>
      </td>
      <td style="font-size:.7rem;color:var(--muted)">${t.group}</td>
      <td>${t.sp}</td>
      <td>${t.tore}:${t.gegen}</td>
      <td>${t.diff>=0?'+'+t.diff:t.diff}</td>
      <td class="rank-pts">${t.pts}</td>
    </tr>`;
  });

  html += `</table></div>
    <p style="font-size:.68rem;color:var(--muted);padding:0 4px 12px;text-align:center">
      Tippe auf ein Team um es als Favorit zu markieren ⭐
    </p>`;

  document.getElementById('rankingCont').innerHTML = html;
}

function toggleFav(code) {
  if(favorites.has(code)) favorites.delete(code);
  else favorites.add(code);
  saveFavs();
  renderRanking();
  // Update fav chip label
  updateFavChip();
}

function updateFavChip() {
  const chip = document.querySelector('.fav-chip');
  if(!chip) return;
  chip.textContent = favorites.size > 0 ? `⭐ Favoriten (${favorites.size})` : '⭐ Favoriten';
}

// ═══════════════════════════════════════
// RENDER FAV EDITOR
// ═══════════════════════════════════════
function renderFavEdit() {
  // Group teams by group for nice display
  let html = `<div class="fav-header">
    <h3>⭐ Favoriten auswählen</h3>
    <p>Tippe auf Teams die du verfolgen möchtest. Die Auswahl wird gespeichert.</p>
  </div>`;

  Object.keys(GD).forEach(g => {
    html += `<div style="font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:6px 2px 5px">Gruppe ${g}</div>
    <div class="fav-grid">`;
    GD[g].teams.forEach(t => {
      const sel = favorites.has(t);
      html += `<div class="fav-team-btn ${sel?'selected':''}" onclick="toggleFavEdit('${t}')">
        <span class="fav-flag">${F(t)}</span>
        <span class="fav-name">${N(t)}</span>
        <span class="fav-star">⭐</span>
      </div>`;
    });
    html += '</div>';
  });

  html += `<button class="fav-done-btn" onclick="favEditDone()">
    ✓ Fertig${favorites.size>0?' ('+favorites.size+' ausgewählt)':''}
  </button>`;

  document.getElementById('favEditCont').innerHTML = html;
}

function toggleFavEdit(code) {
  if(favorites.has(code)) favorites.delete(code);
  else favorites.add(code);
  saveFavs();
  updateFavChip();
  renderFavEdit();
}

function favEditDone() {
  if(pendingFilter==='favoriten' && favorites.size>0) {
    pendingFilter=null;
    setFilter('favoriten');
  } else {
    switchView(0);
  }
}

// Pre-select default favorites: Germany, Canada, Norway
if(favorites.size===0){
  ['GER','CAN','NOR'].forEach(c=>favorites.add(c));
  saveFavs();
}

// ── PWA Install ─────────────────────────────────────
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installHint').innerHTML = '';
  deferredPrompt = null;
});

async function triggerInstall() {
  if(deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    // Hide banner regardless of outcome
    document.getElementById('installHint').innerHTML = '';
    deferredPrompt = null;
  }
}

function showInstallBanner() {
  const ios = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone = window.navigator.standalone ||
    window.matchMedia('(display-mode: standalone)').matches ||
    document.referrer.includes('android-app://');
  if(standalone) return;
  // Also hide if already dismissed this session
  try { if(sessionStorage.getItem('installDismissed')) return; } catch(e){}

  const hint = document.getElementById('installHint');
  if(deferredPrompt) {
    // Android/Chrome: native install button
    hint.innerHTML = `
      <div class="install">
        <div class="install-icon">📲</div>
        <p><strong>Als App installieren</strong>Einmal tippen – immer dabei</p>
        <button class="install-btn" onclick="triggerInstall()">Installieren</button>
        <button class="install-close" onclick="try{sessionStorage.setItem('installDismissed','1')}catch(e){}; this.closest('.install').remove()">✕</button>
      </div>`;
  } else if(ios) {
    // iOS: manual instructions
    hint.innerHTML = `
      <div class="install">
        <div class="install-icon">📲</div>
        <p><strong>Als App installieren</strong>Teilen <span style="font-size:1rem">⎋</span> → „Zum Home-Bildschirm"</p>
        <button class="install-close" onclick="this.closest('.install').remove()">✕</button>
      </div>`;
  }
}

window.addEventListener('load', () => {
  const standalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  if(!standalone) showInstallBanner();
  // Render static data immediately, then try API in background
  GAMES = STATIC_GAMES.map(g => ({...g}));
  render();
  loadLiveData();
});
